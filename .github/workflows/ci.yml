name: Lynk CI

on:
  pull_request:
  push:
    branches:
      - main
      - work
      - 'codex/**'

concurrency:
  group: lynk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, build, test, migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lynk
          POSTGRES_PASSWORD: lynk_ci_password
          POSTGRES_DB: lynk_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lynk -d lynk_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:19006
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: lynk
      DB_PASSWORD: lynk_ci_password
      DB_NAME: lynk_ci
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test_access_secret_minimum_32_chars
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars
      PAWAPAY_API_KEY: ''
      PAWAPAY_WEBHOOK_SECRET: ''
      BINANCE_PAY_API_KEY: ''
      BINANCE_PAY_SECRET_KEY: ''
      PI_API_KEY: ''
      PI_API_BASE_URL: https://api.minepi.com/v2
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ''
      AWS_SECRET_ACCESS_KEY: ''
      AWS_S3_BUCKET: ''
      OPENAI_API_KEY: ''
      FIREBASE_PROJECT_ID: ''
      FIREBASE_CLIENT_EMAIL: ''
      FIREBASE_PRIVATE_KEY: ''
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e

      - name: Run migrations on clean PostgreSQL
        run: npm run migration:run

      - name: Revert latest migration
        run: npm run migration:revert

      - name: Re-run migrations after revert
        run: npm run migration:run

  frontend:
    name: Frontend install, lint, typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Expo doctor
        run: npx --yes expo-doctor
        continue-on-error: true

      - name: Expo export
        run: npx expo export
